version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: the_vault_db
    restart: always
    environment:
      MYSQL_DATABASE: the_vault_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - the_vault_network

  api:
    build: .
    container_name: the_vault_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/the_vault_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - the_vault_network

volumes:
  mysql_data:

networks:
  the_vault_network:
    driver: bridge